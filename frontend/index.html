<!DOCTYPE html>
<html lang="en" data-theme="ihsan">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Arabic reading fonts (free, display=swap): Amiri = muṣḥaf calligraphy,
         Scheherazade New = traditional naskh. The default "clean" option uses
         system fonts and needs no download. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;500&display=swap" rel="stylesheet" />
    <title>Ihsan — Muslim Worship & Productivity Tracker</title>
    <meta
      name="description"
      content="Track your zikr, salat, fasting and Quran reading — with authentic references, streaks, prayer times and a friends leaderboard. Free, private, and built for the Muslim community."
    />
    <meta name="keywords" content="islamic app, zikr counter, tasbih counter, salat tracker, prayer tracker, fasting tracker, quran habit, prayer times, muslim productivity" />
    <meta name="author" content="Istiak Islam" />
    <meta name="theme-color" content="#0d1520" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://ihsan-web-app-main.vercel.app/" />

    <!-- Open Graph (Facebook, WhatsApp, Messenger, LinkedIn…) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ihsan" />
    <meta property="og:title" content="Ihsan — Muslim Worship & Productivity Tracker" />
    <meta property="og:description" content="Zikr, salat, fasting, Quran and prayer times — with streaks, authentic references, and friends to race toward good. 'So compete with one another in doing good' (Quran 2:148)." />
    <meta property="og:url" content="https://ihsan-web-app-main.vercel.app/" />
    <meta property="og:image" content="https://ihsan-web-app-main.vercel.app/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Ihsan — your daily worship companion" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ihsan — Muslim Worship & Productivity Tracker" />
    <meta name="twitter:description" content="Zikr, salat, fasting, Quran and prayer times — with streaks, authentic references, and friends to race toward good." />
    <meta name="twitter:image" content="https://ihsan-web-app-main.vercel.app/og-image.jpg" />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Ihsan",
      "alternateName": "Ihsan — Muslim Worship & Productivity Tracker",
      "url": "https://ihsan-web-app-main.vercel.app/",
      "description": "Track zikr, salat, fasting and Quran reading with streaks, prayer times, authentic Quran & hadith references, and a friends leaderboard.",
      "applicationCategory": "LifestyleApplication",
      "operatingSystem": "Web",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "author": { "@type": "Person", "name": "Istiak Islam", "url": "https://github.com/isttiiak" },
      "inLanguage": "en",
      "featureList": [
        "Zikr counter with daily goals and streaks",
        "Salat tracker with analytics",
        "Prayer times calculated on-device",
        "Fiqh-aware fasting tracker",
        "Quran reading habit and khatm journey",
        "Friends leaderboard"
      ]
    }
    </script>

    <script>
      try {
        const t = localStorage.getItem("ihsan_theme") || "ihsan";
        document.documentElement.setAttribute("data-theme", t);
      } catch {}
    </script>

    <!-- Google Analytics 4 — loads only when VITE_GA_MEASUREMENT_ID is set.
         SPA page views are sent from App.tsx on every route change. -->
    <script>
      (function () {
        var gaId = "%VITE_GA_MEASUREMENT_ID%";
        if (!gaId || gaId.indexOf("%") !== -1 || gaId === "undefined") return;
        var s = document.createElement("script");
        s.async = true;
        s.src = "https://www.googletagmanager.com/gtag/js?id=" + gaId;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        window.gtag = function () { window.dataLayer.push(arguments); };
        window.gtag("js", new Date());
        window.gtag("config", gaId, { send_page_view: false, anonymize_ip: true });
        window.__IHSAN_GA_ID = gaId;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
